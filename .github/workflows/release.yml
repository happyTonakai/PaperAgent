name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g. v1.1.1). Overrides auto-bump."
        required: false
        type: string
        default: ""
      bump:
        description: "Auto version bump (used only when 'version' is empty)"
        required: true
        type: choice
        default: "patch"
        options:
          - patch
          - minor
          - major
      release_notes:
        description: "Release notes (markdown). Leave empty for auto-generated from commits"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Compute next version
        id: version
        run: |
          CUSTOM="${{ inputs.version }}"
          if [ -n "$CUSTOM" ]; then
            echo "Using explicit version: $CUSTOM"
            echo "tag=$CUSTOM" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --tags
          LATEST=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//;s/\..*//')
            MINOR=$(echo "$LATEST" | sed 's/v[0-9]*\.//;s/\..*//')
            PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.//')
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        env:
          # Vite + Tailwind 4 + KaTeX + highlight.js peaks above the 4GB
          # default Node heap on the 7GB ubuntu-latest runner, getting
          # SIGKILLed at module-transform time. 4GB is enough headroom.
          NODE_OPTIONS: --max-old-space-size=4096
        run: cd frontend && npm ci && npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: internal/server/frontend-dist/

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - { os: macos-latest, goos: darwin, goarch: arm64 }
          - { os: windows-latest, goos: windows, goarch: amd64 }
          - { os: ubuntu-latest, goos: linux, goarch: amd64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/server/frontend-dist/

      - name: Build paperagent
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"
          SUFFIX=""
          if [ "${{ matrix.goos }}" = "windows" ]; then SUFFIX=".exe"; fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="$LDFLAGS" -o "dist/paperagent_${{ matrix.goos }}_${{ matrix.goarch }}${SUFFIX}" .

      - name: Build arxiv2md
        shell: bash
        run: |
          SUFFIX=""
          if [ "${{ matrix.goos }}" = "windows" ]; then SUFFIX=".exe"; fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "dist/arxiv2md_${{ matrix.goos }}_${{ matrix.goarch }}${SUFFIX}" ./cmd/arxiv2md/

      - name: Codesign (macOS)
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          codesign --force --deep --sign "-" "dist/paperagent_${{ matrix.goos }}_${{ matrix.goarch }}"
          codesign --force --deep --sign "-" "dist/arxiv2md_${{ matrix.goos }}_${{ matrix.goarch }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: paperagent_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist/
          merge-multiple: true

      - name: Create tag
        run: |
          git tag "${{ needs.prepare.outputs.version }}"
          git push origin "${{ needs.prepare.outputs.version }}"

      - name: Write custom release notes
        if: ${{ inputs.release_notes != '' }}
        shell: bash
        env:
          NOTES: ${{ inputs.release_notes }}
        run: printf '%s\n' "$NOTES" > /tmp/release_body.md

      - name: Create release (custom notes)
        if: ${{ inputs.release_notes != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          body_path: /tmp/release_body.md
          files: dist/*

      - name: Create release (auto-generated notes)
        if: ${{ inputs.release_notes == '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: dist/*
