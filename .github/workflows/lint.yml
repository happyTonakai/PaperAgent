name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# golangci-lint v2 自带 cache step；保留 concurrency 让重复 push 取消上一次跑。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false  # golangci-lint-action 自带 internal cache

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # //go:embed frontend-dist 在 internal/server/server.go:23 依赖该目录存在。
      # golangci-lint 的 typecheck linter 内部会跑 go build，找不到目录就直接挂。
      # 必须先构建前端，与 .github/workflows/ci.yml 一致。
      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # 与本地一致：v2.12（详见 .golangci.yaml version 字段）
          version: v2.12.2
          args: --config .golangci.yaml ./...